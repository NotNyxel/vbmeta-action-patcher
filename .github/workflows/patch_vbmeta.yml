name: Patch VBMeta

on:
  workflow_dispatch:
    inputs:
      ARCHITECTURE:
        description: 'Architecture of the TOOL (not the tablet)'
        required: true
        default: 'x86_64'
        type: choice
        options:
        - x86_64
        - x86
        - arm64-v8a
        - armaebi-v7a

permissions:
  contents: write

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-latest
    steps:
 
    - name: Check Out
      uses: actions/checkout@v3.1.0
      
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      
    - name: Download User VBMeta
      # This allows you to upload your stock vbmeta.img via the GitHub UI 
      # or assumes it is already in the root of your repository.
      run: |
        if [ ! -f vbmeta.img ]; then
          echo "::error::vbmeta.img not found in repository root! Please upload it to your repo first."
          exit 1
        fi

    - name: Patch File Information
      run: |
        file ${{ github.event.inputs.ARCHITECTURE }}/vbmeta-disable-verification
        
    - name: Give Permission and Run Patch
      run: |
        chmod +x ${{ github.event.inputs.ARCHITECTURE }}/vbmeta-disable-verification
        ./${{ github.event.inputs.ARCHITECTURE }}/vbmeta-disable-verification vbmeta.img

    - name: Upload to Release
      uses: ncipollo/release-action@v1.12.0
      with:
        artifacts: vbmeta.img
        name: Patched VBMeta
        tag: patch-${{ github.run_id }}
        token: ${{ secrets.GITHUB_TOKEN }}
        body: |
          Your vbmeta image is now patched!
          Flash this alongside TWRP in Odin.

    - name: Link to Release
      run: |
        echo "Download here: https://github.com/${GITHUB_REPOSITORY}/releases/tag/patch-${{ github.run_id }}"
